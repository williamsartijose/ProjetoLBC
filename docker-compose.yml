services:
  postgres:
    image: postgres:16-alpine
    container_name: vacation-postgres
    environment:
      POSTGRES_DB: vacation_db
      POSTGRES_USER: vacation_user
      POSTGRES_PASSWORD: vacation_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacation_user -d vacation_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: williamsartijose/projetolbc-backend:latest
    container_name: vacation-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vacation_db
      SPRING_DATASOURCE_USERNAME: vacation_user
      SPRING_DATASOURCE_PASSWORD: vacation_pass
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    image: williamsartijose/projetolbc-frontend:latest
    container_name: vacation-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "5173:80"

volumes:
  postgres-data:
